    { name = "imagehash", specifier = ">=4.3" },
    { name = "imageio", specifier = ">=2.34" },
    { name = "imageio-ffmpeg", specifier = ">=0.5" },
    { name = "numpy", specifier = ">=2.0" },
    { name = "opencv-python", specifier = ">=4.9" },
    { name = "pillow", specifier = ">=10.4" },
    { name = "typer", specifier = ">=0.15" },
]

[package.metadata.requires-dev]
dev = [{ name = "pytest", specifier = ">=8.2" }]
